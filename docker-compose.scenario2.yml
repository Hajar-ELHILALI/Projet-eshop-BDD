services:
  db-master:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: eshop-master
    hostname: db-master
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${MASTER_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
    ports:
      - "${MASTER_PORT}:1521"
    volumes:
      - ./scripts/scenario2/master:/container-entrypoint-initdb.d
      - ./tnsnames.ora:/opt/oracle/network/admin/tnsnames.ora
      - ./scripts/scenario2/global-queries:/queries:ro
      - oradata_master:/opt/oracle/oradata
    networks:
      - eshop-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  db-site1:
    build:
      context: .
      dockerfile: Dockerfile.site
    container_name: eshop-site1
    hostname: db-site1
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${SITE1_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
    ports:
      - "${SITE1_PORT}:1521"
    depends_on:
      db-master:
        condition: service_healthy
    volumes:
      - ./scripts/scenario2/site1:/container-entrypoint-initdb.d
      - ./tnsnames.ora:/opt/oracle/network/admin/tnsnames.ora
      - oradata_site1:/opt/oracle/oradata
    networks:
      - eshop-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  db-site2:
    build:
      context: .
      dockerfile: Dockerfile.site
    container_name: eshop-site2
    hostname: db-site2
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${SITE2_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
    ports:
      - "${SITE2_PORT}:1521"
    depends_on:
      db-master:
        condition: service_healthy
    volumes:
      - ./scripts/scenario2/site2:/container-entrypoint-initdb.d
      - ./tnsnames.ora:/opt/oracle/network/admin/tnsnames.ora
      - oradata_site2:/opt/oracle/oradata
    networks:
      - eshop-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  db-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: eshop-backup
    hostname: db-backup
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${BACKUP_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - TNS_ADMIN=${TNS_ADMIN}
    ports:
      - "${BACKUP_PORT}:1521"
    depends_on:
      db-master:
        condition: service_healthy
    volumes:
      - ./scripts/scenario2/backup:/container-entrypoint-initdb.d
      - ./tnsnames.ora:/opt/oracle/network/admin/tnsnames.ora
      - oradata_backup:/opt/oracle/oradata
    networks:
      - eshop-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  eshop-net:
    driver: bridge

volumes:
  oradata_master:
  oradata_site1:
  oradata_site2:
  oradata_backup:
